  <ellipse cx="454" cy="150" rx="14" ry="38" fill="#ffffff" />
  <ellipse cx="406" cy="151" rx="6" ry="28" fill="#ffd6e7" />
  <ellipse cx="454" cy="151" rx="6" ry="28" fill="#ffd6e7" />
  <circle cx="415" cy="201" r="4" fill="#2f2f2f" />
  <circle cx="445" cy="201" r="4" fill="#2f2f2f" />
