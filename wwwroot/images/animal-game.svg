  <circle cx="200" cy="195" r="52" fill="#f4a261" />
  <circle cx="200" cy="198" r="34" fill="#ffe8ba" />
  <circle cx="186" cy="192" r="4" fill="#2f2f2f" />
  <circle cx="214" cy="192" r="4" fill="#2f2f2f" />
  <path d="M190 208 Q200 216 210 208" stroke="#2f2f2f" stroke-width="3" fill="none" stroke-linecap="round" />
  <circle cx="162" cy="170" r="12" fill="#f4a261" />
  <circle cx="238" cy="170" r="12" fill="#f4a261" />

