<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Jogo de animais para criancas</title>
  <desc id="desc">Ilustracao colorida com sol, grama e animais amigaveis para capa de jogo infantil.</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8ecff" />
      <stop offset="100%" stop-color="#f2fbff" />
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86d37a" />
      <stop offset="100%" stop-color="#5ba95c" />
    </linearGradient>
  </defs>

  <rect width="640" height="360" fill="url(#sky)" />
  <circle cx="84" cy="78" r="42" fill="#ffd166" />
  <rect y="250" width="640" height="110" fill="url(#ground)" />

  <ellipse cx="200" cy="280" rx="70" ry="22" fill="#4f8f4f" opacity="0.35" />
  <ellipse cx="430" cy="286" rx="76" ry="24" fill="#4f8f4f" opacity="0.35" />

