<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Jogo de cores para criancas</title>
  <desc id="desc">Ilustracao colorida com circulos e blocos de tinta para representar um jogo infantil de cores.</desc>

  <defs>
