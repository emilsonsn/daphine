      <stop offset="0%" stop-color="#b8f3ff" />
      <stop offset="100%" stop-color="#fff2d0" />
    </linearGradient>
  </defs>

  <rect width="640" height="360" fill="url(#bg)" />
  <circle cx="82" cy="70" r="40" fill="#ffcc33" opacity="0.95" />
  <circle cx="568" cy="74" r="46" fill="#74d1ff" opacity="0.95" />

  <rect x="52" y="140" width="160" height="130" rx="24" fill="#ff6f61" />
  <rect x="240" y="120" width="160" height="150" rx="24" fill="#4ecdc4" />
  <rect x="428" y="150" width="160" height="120" rx="24" fill="#ffd166" />

  <circle cx="132" cy="305" r="28" fill="#7b61ff" />
  <circle cx="238" cy="305" r="28" fill="#ff8fab" />
  <circle cx="344" cy="305" r="28" fill="#2ec4b6" />
  <circle cx="450" cy="305" r="28" fill="#f8961e" />
  <circle cx="556" cy="305" r="28" fill="#5fa8ff" />

  <text x="320" y="52" text-anchor="middle" font-family="Verdana, sans-serif" font-size="34" font-weight="700" fill="#0e5260">
