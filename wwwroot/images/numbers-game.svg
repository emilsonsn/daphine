<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Jogo dos numeros para criancas</title>
  <desc id="desc">Ilustracao infantil com porquinhos e numeros grandes.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9f5ff" />
      <stop offset="100%" stop-color="#ffe8d0" />
    </linearGradient>
  </defs>

  <rect width="640" height="360" fill="url(#bg)" />
  <rect y="255" width="640" height="105" fill="#85d37a" />

  <text x="320" y="52" text-anchor="middle" font-family="Verdana, sans-serif" font-size="34" font-weight="700" fill="#0e5260">
    Clique nos Numeros
  </text>

  <circle cx="150" cy="190" r="44" fill="#ffb3c7" />
  <circle cx="320" cy="195" r="44" fill="#ffb3c7" />
  <circle cx="490" cy="190" r="44" fill="#ffb3c7" />

  <ellipse cx="132" cy="176" rx="8" ry="6" fill="#ff8faf" />
  <ellipse cx="168" cy="176" rx="8" ry="6" fill="#ff8faf" />
  <ellipse cx="302" cy="181" rx="8" ry="6" fill="#ff8faf" />
  <ellipse cx="338" cy="181" rx="8" ry="6" fill="#ff8faf" />
  <ellipse cx="472" cy="176" rx="8" ry="6" fill="#ff8faf" />
  <ellipse cx="508" cy="176" rx="8" ry="6" fill="#ff8faf" />

  <circle cx="136" cy="188" r="4" fill="#303030" />
  <circle cx="164" cy="188" r="4" fill="#303030" />
  <circle cx="306" cy="193" r="4" fill="#303030" />
  <circle cx="334" cy="193" r="4" fill="#303030" />
  <circle cx="476" cy="188" r="4" fill="#303030" />
  <circle cx="504" cy="188" r="4" fill="#303030" />

  <text x="150" y="200" text-anchor="middle" font-family="Verdana, sans-serif" font-size="36" font-weight="700" fill="#6d2e40">1</text>
  <text x="320" y="205" text-anchor="middle" font-family="Verdana, sans-serif" font-size="36" font-weight="700" fill="#6d2e40">2</text>
  <text x="490" y="200" text-anchor="middle" font-family="Verdana, sans-serif" font-size="36" font-weight="700" fill="#6d2e40">3</text>
</svg>
